<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <link rel="mask-icon" href="/mask-icon.svg" color="%THEME_PRIMARY%" />
    <!-- Requirement: viewport-fit=cover for safe area inset support on notched devices (iOS)
         Approach: Enables env(safe-area-inset-*) CSS values for notch/home indicator clearance
         Alternatives considered:
           - No viewport-fit: Rejected — content overlaps notch on iOS when status bar is translucent -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
    <meta name="theme-color" content="%THEME_BACKGROUND%" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="JT Resume" />
    <meta name="description" content="Personal CV and resume of Jaco Theron, Solutions / Software / Sales Engineer & Analyst" />
    <title>Jaco Theron - Solutions Engineer</title>
    <!-- Google tag (gtag.js) -->
    <!-- Requirement: Add Google Analytics (gtag.js) for site usage tracking
         Approach: Standard gtag.js snippet placed in <head> as recommended by Google,
                   with the loader script async to avoid blocking page render
         Alternatives considered:
           - react-ga / react-ga4 wrapper: Rejected — adds a dependency and an extra render-time
             init step; the standard snippet works for a single-page app with no client-side routing
           - Lazy-load after first interaction: Rejected — would miss initial page-view tracking,
             which is the primary signal we want to capture -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-61SDQXZSFT"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-61SDQXZSFT');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Requirement: Capture beforeinstallprompt before React mounts
         Approach: Inline script stores the event on window so the React hook can retrieve it
         Alternatives considered:
           - Move listener to main.tsx before createRoot: Rejected — module scripts are deferred,
             so the event may still fire before the module executes
           - Synchronous external script: Rejected — adds a network request; inline is instant -->
    <script>
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__pwaInstallPrompt = e;
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
