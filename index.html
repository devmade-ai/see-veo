<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <link rel="mask-icon" href="/mask-icon.svg" color="%THEME_PRIMARY%" />
    <!-- Requirement: viewport-fit=cover for safe area inset support on notched devices (iOS)
         Approach: Enables env(safe-area-inset-*) CSS values for notch/home indicator clearance
         Alternatives considered:
           - No viewport-fit: Rejected — content overlaps notch on iOS when status bar is translucent -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <meta name="theme-color" content="%THEME_BACKGROUND%" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="JT Resume" />
    <meta name="description" content="Personal CV and resume of Jaco Theron, Solutions / Software / Sales Engineer & Analyst" />
    <title>Jaco Theron - Solutions Engineer</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Requirement: Capture beforeinstallprompt before React mounts
         Approach: Inline script stores the event on window so the React hook can retrieve it
         Alternatives considered:
           - Move listener to main.tsx before createRoot: Rejected — module scripts are deferred,
             so the event may still fire before the module executes
           - Synchronous external script: Rejected — adds a network request; inline is instant -->
    <script>
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__pwaInstallPrompt = e;
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
