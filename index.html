<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <link rel="mask-icon" href="/mask-icon.svg" color="#d4d4d4" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="JT Resume" />
    <meta name="description" content="Personal CV and resume of Jaco Theron, Solutions / Software / Sales Engineer & Analyst" />
    <title>Jaco Theron - Solutions Engineer</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Requirement: Capture beforeinstallprompt before React mounts
         Approach: Inline script stores the event on window so the React hook can retrieve it
         Alternatives considered:
           - Move listener to main.tsx before createRoot: Rejected — module scripts are deferred,
             so the event may still fire before the module executes
           - Synchronous external script: Rejected — adds a network request; inline is instant -->
    <script>
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__pwaInstallPrompt = e;
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
